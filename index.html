<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Onur & Ada — Sonsuza Kadar</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose: #e8315b;
    --rose-light: #ff6b95;
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --cream: #fff8f0;
    --deep: #1a0510;
    --glass: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.08);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--deep);
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: var(--cream);
    -webkit-tap-highlight-color: transparent;
  }

  canvas {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  #bgCanvas  { z-index: 0; }
  #pCanvas   { z-index: 2; }
  #oCanvas   { z-index: 4; }

  .bg-texture {
    position: fixed; inset: 0; z-index: 1;
    background:
      radial-gradient(ellipse 80% 60% at 20% 50%, rgba(100,10,40,0.6) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 30%, rgba(50,5,30,0.5) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 50% 80%, rgba(150,20,60,0.3) 0%, transparent 50%);
  }

  /* YAPRAKLAR */
  .petal {
    position: fixed;
    border-radius: 50% 50% 50% 0;
    background: linear-gradient(135deg, rgba(232,49,91,0.6), rgba(255,107,149,0.3));
    animation: petalFall linear infinite;
    z-index: 3;
    pointer-events: none;
    filter: blur(0.5px);
  }
  @keyframes petalFall {
    0%   { transform: translateY(-20px) rotate(0deg) translateX(0px); opacity: 0; }
    10%  { opacity: 0.8; }
    90%  { opacity: 0.5; }
    100% { transform: translateY(110vh) rotate(720deg) translateX(60px); opacity: 0; }
  }

  /* FOTOĞRAFLAR — masaüstü köşe */
  .photo-orbit { position: fixed; z-index: 5; }
  .photo-frame {
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .photo-frame:hover { transform: scale(1.08) rotate(0deg) !important; z-index: 20; }
  .photo-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .photo-frame::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 20px;
    border: 1.5px solid rgba(255,255,255,0.25);
    z-index: 2; pointer-events: none;
  }
  .photo-frame::after {
    content: '';
    position: absolute; inset: -3px;
    border-radius: 23px;
    background: linear-gradient(135deg, rgba(201,168,76,.5), rgba(232,49,91,.3), rgba(201,168,76,.5));
    z-index: -1;
    animation: frameGlow 3s ease-in-out infinite alternate;
  }
  @keyframes frameGlow { from{opacity:.6} to{opacity:1} }
  .photo-frame .shimmer {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.06) 50%, transparent 70%);
    z-index: 3;
  }

  /* Masaüstü köşe konumları */
  .orbit-1 { top:36px;    left:36px;   width:170px; height:210px; }
  .orbit-2 { top:36px;    right:36px;  width:150px; height:190px; }
  .orbit-3 { bottom:36px; left:36px;   width:158px; height:200px; }
  .orbit-4 { bottom:36px; right:36px;  width:165px; height:205px; }
  .orbit-1 .photo-frame { transform:rotate(-3deg); }
  .orbit-2 .photo-frame { transform:rotate(2.5deg); }
  .orbit-3 .photo-frame { transform:rotate(2deg); }
  .orbit-4 .photo-frame { transform:rotate(-2.5deg); }

  /* MOBİL — fotoğrafları üstte yatay şerit yap */
  @media (max-width: 700px) {
    .photo-orbit { position: static; }
    .orbit-1,.orbit-2,.orbit-3,.orbit-4 {
      width: auto; height: auto;
    }
    .photo-strip {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 5;
      display: flex;
      gap: 8px;
      padding: 10px 10px 0;
      justify-content: center;
    }
    .photo-strip .photo-orbit {
      position: relative;
      flex: 1;
      max-width: 22vw;
      height: 28vw;
    }
    .photo-strip .photo-frame {
      width: 100%; height: 100%;
      border-radius: 12px;
    }
    .photo-strip .photo-frame::after { border-radius: 15px; }
    .photo-strip .photo-frame::before { border-radius: 12px; }
    .orbit-1 .photo-frame,
    .orbit-2 .photo-frame,
    .orbit-3 .photo-frame,
    .orbit-4 .photo-frame { transform: none; }
  }

  /* ANA KART */
  .center-stage {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    width: min(520px, 92vw);
    text-align: center;
    animation: stageReveal 2.4s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes stageReveal {
    from { opacity:0; transform:translate(-50%,calc(-50% + 30px)); }
    to   { opacity:1; transform:translate(-50%,-50%); }
  }

  /* Mobilde kartı biraz aşağı it (fotoğraf şeridinden kaçsın) */
  @media (max-width: 700px) {
    .center-stage {
      top: calc(50% + 18px);
      max-height: calc(100dvh - 90px);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
  }

  .card {
    background: var(--glass);
    backdrop-filter: blur(30px) saturate(1.5);
    -webkit-backdrop-filter: blur(30px) saturate(1.5);
    border: 1px solid var(--glass-border);
    border-radius: 36px;
    padding: clamp(28px, 6vw, 52px) clamp(20px, 6vw, 48px);
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,.6) 20%, rgba(255,255,255,.4) 50%, rgba(232,49,91,.6) 80%, transparent);
  }
  .card-inner-glow {
    position: absolute;
    top: -40%; left: 50%;
    transform: translateX(-50%);
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(232,49,91,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .heart-orb {
    display: inline-block;
    font-size: clamp(38px, 8vw, 56px);
    margin-bottom: 10px;
    animation: heartPulse 1.6s cubic-bezier(0.25,0.46,0.45,0.94) infinite;
    filter: drop-shadow(0 0 20px rgba(232,49,91,0.8)) drop-shadow(0 0 40px rgba(232,49,91,0.4));
    cursor: default; user-select: none;
  }
  @keyframes heartPulse {
    0%  { transform:scale(1);    filter:drop-shadow(0 0 16px rgba(232,49,91,0.7)) drop-shadow(0 0 32px rgba(232,49,91,0.3)); }
    15% { transform:scale(1.18); filter:drop-shadow(0 0 28px rgba(232,49,91,1))   drop-shadow(0 0 56px rgba(232,49,91,0.6)); }
    30% { transform:scale(1.05); }
    45% { transform:scale(1.14); filter:drop-shadow(0 0 22px rgba(232,49,91,0.9)) drop-shadow(0 0 44px rgba(232,49,91,0.5)); }
    70% { transform:scale(1); }
  }

  .headline {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(1.8rem, 7vw, 3.4rem);
    font-weight: 700;
    letter-spacing: 0.08em;
    line-height: 1.1;
    background: linear-gradient(135deg, var(--gold-light) 0%, var(--cream) 40%, var(--rose-light) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 5px;
  }

  .subtitle {
    font-size: clamp(0.6rem, 2vw, 0.8rem);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.75;
    margin-bottom: 20px;
    font-weight: 300;
  }

  .names-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 20px;
  }
  .name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.3rem, 5vw, 2.2rem);
    font-weight: 400;
    font-style: italic;
    color: var(--cream);
    text-shadow: 0 0 30px rgba(255,248,240,0.3);
  }
  .name-divider {
    font-size: clamp(1.2rem, 4vw, 1.6rem);
    animation: dividerPulse 2s ease-in-out infinite;
  }
  @keyframes dividerPulse {
    0%,100%{opacity:.5;transform:scale(1)}
    50%{opacity:1;transform:scale(1.3)}
  }

  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 0 0 20px; opacity: 0.5;
  }
  .divider-line { flex:1; height:.5px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
  .divider-diamond { width:5px;height:5px;background:var(--gold);transform:rotate(45deg); }

  .message {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(0.9rem, 3.2vw, 1.18rem);
    font-style: italic;
    font-weight: 300;
    line-height: 1.8;
    color: rgba(255,248,240,0.88);
    letter-spacing: 0.02em;
    margin-bottom: 24px;
  }
  .message .highlight { color:var(--rose-light); font-style:normal; font-weight:400; }

  .signature {
    margin-top: 20px;
    font-size: clamp(0.6rem, 2vw, 0.72rem);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,248,240,0.25);
  }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<canvas id="pCanvas"></canvas>
<canvas id="oCanvas"></canvas>
<div class="bg-texture"></div>
<div id="petals"></div>

<!-- Masaüstü köşe fotoğraflar (700px üstü) -->
<div class="photo-orbit orbit-1" id="d1">
  <div class="photo-frame"><img src="foto1.png" alt=""><div class="shimmer"></div></div>
</div>
<div class="photo-orbit orbit-2" id="d2">
  <div class="photo-frame"><img src="foto2.png" alt=""><div class="shimmer"></div></div>
</div>
<div class="photo-orbit orbit-3" id="d3">
  <div class="photo-frame"><img src="foto3.png" alt=""><div class="shimmer"></div></div>
</div>
<div class="photo-orbit orbit-4" id="d4">
  <div class="photo-frame"><img src="foto4.png" alt=""><div class="shimmer"></div></div>
</div>

<!-- Mobil üst şerit -->
<div class="photo-strip" id="strip" style="display:none">
  <div class="photo-orbit orbit-1">
    <div class="photo-frame"><img src="foto1.png" alt=""><div class="shimmer"></div></div>
  </div>
  <div class="photo-orbit orbit-2">
    <div class="photo-frame"><img src="foto2.png" alt=""><div class="shimmer"></div></div>
  </div>
  <div class="photo-orbit orbit-3">
    <div class="photo-frame"><img src="foto3.png" alt=""><div class="shimmer"></div></div>
  </div>
  <div class="photo-orbit orbit-4">
    <div class="photo-frame"><img src="foto4.png" alt=""><div class="shimmer"></div></div>
  </div>
</div>

<div class="center-stage">
  <div class="card">
    <div class="card-inner-glow"></div>
    <div class="heart-orb" id="heartOrb">❤️</div>
    <h1 class="headline">ADOŞŞ</h1>
    <p class="subtitle">ile sonsuza kadar &nbsp;·&nbsp; forever &amp; always</p>
    <div class="names-row">
      <span class="name">Onur</span>
      <span class="name-divider">❤️</span>
      <span class="name">Ada</span>
    </div>
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line"></div>
    </div>
    <p class="message">
      Sen benim en derin duygum,<br>
      <span class="highlight">en güzel gerçeğimsin.</span><br><br>
      Gözlerinle ruhuma dokunduğun her an,<br>
      dünyanın bütün anlamı sende toplanıyor.<br><br>
      Yanında olmak, seni sevmek…<br>
      Bu hayattaki <span class="highlight">en büyük şansım.</span>
    </p>
    <p class="signature">✦ &nbsp; Onur tarafından Ada'ya, kalpten &nbsp; ✦</p>
  </div>
</div>

<script>
// Mobil/masaüstü foto düzeni
function layoutPhotos() {
  const mobile = window.innerWidth <= 700;
  document.getElementById('strip').style.display = mobile ? 'flex' : 'none';
  ['d1','d2','d3','d4'].forEach(id => {
    document.getElementById(id).style.display = mobile ? 'none' : 'block';
  });
}
layoutPhotos();
window.addEventListener('resize', layoutPhotos);

// ── Canvas kurulum ──
const bgC=document.getElementById('bgCanvas'), bgX=bgC.getContext('2d');
const pC=document.getElementById('pCanvas'),   pX=pC.getContext('2d');
const oC=document.getElementById('oCanvas'),   oX=oC.getContext('2d');
let W,H;

function resize(){
  W=bgC.width=pC.width=oC.width=window.innerWidth;
  H=bgC.height=pC.height=oC.height=window.innerHeight;
  drawBg();
}
window.addEventListener('resize',resize);

function drawBg(){
  bgX.fillStyle='#1a0510';
  bgX.fillRect(0,0,W,H);
  [{x:.15,y:.45,rx:.35,ry:.55,c:'rgba(120,10,50,.55)'},
   {x:.8, y:.25,rx:.3, ry:.4, c:'rgba(80,5,40,.45)'},
   {x:.5, y:.85,rx:.45,ry:.3, c:'rgba(160,20,60,.35)'},
   {x:.5, y:.5, rx:.2, ry:.2, c:'rgba(200,30,70,.15)'}
  ].forEach(b=>{
    const g=bgX.createRadialGradient(b.x*W,b.y*H,0,b.x*W,b.y*H,Math.max(b.rx*W,b.ry*H));
    g.addColorStop(0,b.c); g.addColorStop(1,'transparent');
    bgX.beginPath();
    bgX.ellipse(b.x*W,b.y*H,b.rx*W,b.ry*H,0,0,Math.PI*2);
    bgX.fillStyle=g; bgX.fill();
  });
  for(let i=0;i<200;i++){
    const sx=Math.random()*W, sy=Math.random()*H, r=Math.random()*1.2, a=Math.random()*.6+.2;
    bgX.beginPath(); bgX.arc(sx,sy,r,0,Math.PI*2);
    bgX.fillStyle=`rgba(255,240,230,${a})`; bgX.fill();
  }
}

// ── Parçacıklar ──
class Particle{
  constructor(){this.reset(true);}
  reset(init=false){
    this.x=Math.random()*W;
    this.y=init?Math.random()*H:H+20;
    this.heart=Math.random()<.12;
    this.size=this.heart?Math.random()*14+6:Math.random()*2.5+.5;
    this.vx=(Math.random()-.5)*.8;
    this.vy=-(Math.random()*1.2+.3);
    this.alpha=Math.random()*.6+.2;
    this.life=1; this.decay=Math.random()*.003+.001;
    this.angle=Math.random()*Math.PI*2;
    this.spin=(Math.random()-.5)*.04;
    const ro=Math.floor(Math.random()*60+30), rb=Math.floor(Math.random()*60+60);
    this.color=Math.random()<.5?`232,${ro},${rb}`:`${Math.floor(Math.random()*30+200)},${Math.floor(Math.random()*80+100)},${Math.floor(Math.random()*50+60)}`;
  }
  update(){
    this.x+=this.vx+Math.sin(this.angle)*.3;
    this.y+=this.vy; this.angle+=this.spin;
    this.life-=this.decay;
    if(this.life<=0||this.y<-30)this.reset();
  }
  draw(ctx){
    ctx.save(); ctx.globalAlpha=this.life*this.alpha;
    ctx.translate(this.x,this.y);
    if(this.heart){
      ctx.rotate(this.angle);
      ctx.font=`${this.size}px serif`;
      ctx.fillStyle=`rgba(${this.color},1)`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('♥',0,0);
    } else {
      ctx.beginPath(); ctx.arc(0,0,this.size,0,Math.PI*2);
      ctx.fillStyle=`rgba(${this.color},${this.life*.8})`; ctx.fill();
    }
    ctx.restore();
  }
}
const particles=Array.from({length:120},()=>new Particle());

// ── Havai fişek ──
class Firework{
  constructor(x,y){
    this.shards=[];
    const n=Math.floor(Math.random()*40+40);
    const cols=[[232,49,91],[255,107,149],[201,168,76],[240,208,128],[255,255,220]];
    const col=cols[Math.floor(Math.random()*cols.length)];
    for(let i=0;i<n;i++){
      const a=(i/n)*Math.PI*2+(Math.random()-.5)*.4;
      const spd=Math.random()*6+2;
      this.shards.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,r:Math.random()*2.5+.5,col,life:1,decay:Math.random()*.018+.01,trail:[]});
    }
  }
  update(){
    this.shards.forEach(s=>{
      s.trail.push({x:s.x,y:s.y});
      if(s.trail.length>6)s.trail.shift();
      s.vx*=.97;s.vy*=.97;s.vy+=.06;
      s.x+=s.vx;s.y+=s.vy;s.life-=s.decay;
    });
    this.shards=this.shards.filter(s=>s.life>0);
  }
  draw(ctx){
    this.shards.forEach(s=>{
      ctx.save();
      if(s.trail.length>1){
        ctx.beginPath();ctx.moveTo(s.trail[0].x,s.trail[0].y);
        s.trail.forEach(t=>ctx.lineTo(t.x,t.y));
        ctx.strokeStyle=`rgba(${s.col},${s.life*.35})`;
        ctx.lineWidth=s.r*.6;ctx.stroke();
      }
      ctx.globalAlpha=s.life;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(${s.col},1)`;
      ctx.shadowColor=`rgba(${s.col},.8)`;ctx.shadowBlur=8;ctx.fill();
      ctx.restore();
    });
  }
  done(){return this.shards.length===0;}
}

let fireworks=[],fwTimer=0;
function launch(){
  fireworks.push(new Firework(W*.2+Math.random()*W*.6, H*.1+Math.random()*H*.45));
}

// Tıklama / dokunma kalpleri
let clickHearts=[];
function spawnHearts(ex,ey){
  for(let i=0;i<8;i++)
    clickHearts.push({x:ex+(Math.random()-.5)*40,y:ey+(Math.random()-.5)*40,
      vy:-(Math.random()*3+1.5),vx:(Math.random()-.5)*2,
      size:Math.random()*22+10,life:1,decay:.025});
  fireworks.push(new Firework(ex,ey));
}
document.addEventListener('click', e=>spawnHearts(e.clientX,e.clientY));
document.addEventListener('touchstart', e=>{
  const t=e.touches[0];
  spawnHearts(t.clientX,t.clientY);
},{passive:true});

document.getElementById('heartOrb').addEventListener('mouseenter',()=>{
  const r=document.getElementById('heartOrb').getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  for(let i=0;i<12;i++)
    clickHearts.push({x:cx+(Math.random()-.5)*30,y:cy+(Math.random()-.5)*30,
      vy:-(Math.random()*2+2),vx:(Math.random()-.5)*3,
      size:Math.random()*16+8,life:1,decay:.02});
});

function animate(){
  requestAnimationFrame(animate);
  pX.clearRect(0,0,W,H);
  particles.forEach(p=>{p.update();p.draw(pX);});
  oX.clearRect(0,0,W,H);
  if(++fwTimer>140){launch();fwTimer=0;}
  fireworks.forEach(f=>{f.update();f.draw(oX);});
  fireworks=fireworks.filter(f=>!f.done());
  clickHearts.forEach(h=>{
    oX.save();oX.globalAlpha=h.life;
    oX.font=`${h.size}px serif`;oX.fillText('💗',h.x,h.y);
    h.x+=h.vx;h.y+=h.vy;h.vy-=.05;h.life-=h.decay;
    oX.restore();
  });
  clickHearts=clickHearts.filter(h=>h.life>0);
}

// Yapraklar
const petalEl=document.getElementById('petals');
function addPetal(){
  const p=document.createElement('div');
  p.className='petal';
  const isRose=Math.random()<.5;
  p.style.cssText=`left:${Math.random()*100}vw;top:-20px;
    width:${Math.random()*10+6}px;height:${Math.random()*14+8}px;
    animation-duration:${Math.random()*8+6}s;
    animation-delay:${Math.random()*3}s;
    opacity:${Math.random()*.5+.3};
    transform:rotate(${Math.random()*360}deg);
    background:linear-gradient(135deg,
      rgba(${isRose?'232,49,91':'201,168,76'},${Math.random()*.5+.3}),
      rgba(255,150,180,.2));`;
  petalEl.appendChild(p);
  setTimeout(()=>p.remove(),14000);
}
setInterval(addPetal,600);

resize();
animate();
setTimeout(()=>{launch();launch();},500);
setTimeout(launch,1200);
</script>
</body>
</html>
