<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onur & Ada — Sonsuza Kadar</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose: #e8315b;
    --rose-light: #ff6b95;
    --rose-glow: rgba(232, 49, 91, 0.35);
    --rose-soft: rgba(232, 49, 91, 0.12);
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --gold-glow: rgba(201, 168, 76, 0.4);
    --cream: #fff8f0;
    --deep: #1a0510;
    --deep2: #2a0a1a;
    --mid: #4a1530;
    --glass: rgba(255, 255, 255, 0.04);
    --glass-border: rgba(255, 255, 255, 0.08);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--deep);
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: var(--cream);
  }

  /* ─── CANVAS KATMANLARI ─── */
  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  #bgCanvas { z-index: 0; }
  #particleCanvas { z-index: 2; }
  #overlayCanvas { z-index: 4; }

  /* ─── ARKAPLAN DOKU ─── */
  .bg-texture {
    position: fixed; inset: 0; z-index: 1;
    background:
      radial-gradient(ellipse 80% 60% at 20% 50%, rgba(100,10,40,0.6) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 30%, rgba(50,5,30,0.5) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 50% 80%, rgba(150,20,60,0.3) 0%, transparent 50%);
  }

  /* ─── FLOATING PETALS ─── */
  .petal {
    position: fixed;
    width: 12px; height: 18px;
    border-radius: 50% 50% 50% 0;
    background: linear-gradient(135deg, rgba(232,49,91,0.6), rgba(255,107,149,0.3));
    animation: petalFall linear infinite;
    z-index: 3;
    pointer-events: none;
    filter: blur(0.5px);
  }
  @keyframes petalFall {
    0%   { transform: translateY(-20px) rotate(0deg) translateX(0px); opacity: 0; }
    10%  { opacity: 0.8; }
    90%  { opacity: 0.5; }
    100% { transform: translateY(110vh) rotate(720deg) translateX(60px); opacity: 0; }
  }

  /* ─── FOTOĞRAF ÇERÇEVELERI ─── */
  .photo-orbit {
    position: fixed;
    z-index: 5;
  }

  .photo-frame {
    position: relative;
    border-radius: 24px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .photo-frame:hover {
    transform: scale(1.08) rotate(0deg) !important;
    z-index: 20;
  }
  .photo-frame img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Her fotoğraf için farklı boyut ve konum */
  .orbit-1 { top: 40px;  left: 40px;  width: 180px; height: 220px; }
  .orbit-2 { top: 40px;  right: 40px; width: 155px; height: 200px; }
  .orbit-3 { bottom: 40px; left: 40px; width: 165px; height: 210px; }
  .orbit-4 { bottom: 40px; right: 40px; width: 175px; height: 215px; }

  .orbit-1 .photo-frame { transform: rotate(-3deg); }
  .orbit-2 .photo-frame { transform: rotate(2.5deg); }
  .orbit-3 .photo-frame { transform: rotate(2deg); }
  .orbit-4 .photo-frame { transform: rotate(-2.5deg); }

  /* Fotoğraf border efekti */
  .photo-frame::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 24px;
    border: 1.5px solid rgba(255,255,255,0.25);
    z-index: 2;
    pointer-events: none;
  }
  .photo-frame::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 27px;
    background: linear-gradient(135deg, rgba(201,168,76,0.5), rgba(232,49,91,0.3), rgba(201,168,76,0.5));
    z-index: -1;
    animation: frameGlow 3s ease-in-out infinite alternate;
  }
  @keyframes frameGlow {
    from { opacity: 0.6; }
    to   { opacity: 1; }
  }

  /* Fotoğraf shimmer */
  .photo-frame .shimmer {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg,
      transparent 30%,
      rgba(255,255,255,0.06) 50%,
      transparent 70%);
    z-index: 3;
  }

  /* ─── ANA KART ─── */
  .center-stage {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    width: min(520px, calc(100vw - 420px));
    text-align: center;
    animation: stageReveal 2.4s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  @keyframes stageReveal {
    from { opacity: 0; transform: translate(-50%, calc(-50% + 30px)); }
    to   { opacity: 1; transform: translate(-50%, -50%); }
  }

  .card {
    background: var(--glass);
    backdrop-filter: blur(30px) saturate(1.5);
    -webkit-backdrop-filter: blur(30px) saturate(1.5);
    border: 1px solid var(--glass-border);
    border-radius: 40px;
    padding: 52px 48px;
    position: relative;
    overflow: hidden;
  }

  /* Kart köşe aksan çizgileri */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg,
      transparent,
      rgba(201,168,76,0.6) 20%,
      rgba(255,255,255,0.4) 50%,
      rgba(232,49,91,0.6) 80%,
      transparent
    );
  }
  .card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg,
      transparent,
      rgba(232,49,91,0.4) 20%,
      rgba(201,168,76,0.3) 50%,
      transparent
    );
  }

  /* İç ışık efekti */
  .card-inner-glow {
    position: absolute;
    top: -40%; left: 50%;
    transform: translateX(-50%);
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(232,49,91,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ─── TİTREŞEN KALP ORTADA ─── */
  .heart-orb {
    display: inline-block;
    font-size: 56px;
    margin-bottom: 16px;
    animation: heartPulse 1.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
    filter: drop-shadow(0 0 20px rgba(232,49,91,0.8)) drop-shadow(0 0 40px rgba(232,49,91,0.4));
    position: relative;
    cursor: default;
    user-select: none;
  }
  @keyframes heartPulse {
    0%   { transform: scale(1);    filter: drop-shadow(0 0 16px rgba(232,49,91,0.7)) drop-shadow(0 0 32px rgba(232,49,91,0.3)); }
    15%  { transform: scale(1.18); filter: drop-shadow(0 0 28px rgba(232,49,91,1))   drop-shadow(0 0 56px rgba(232,49,91,0.6)); }
    30%  { transform: scale(1.05); }
    45%  { transform: scale(1.14); filter: drop-shadow(0 0 22px rgba(232,49,91,0.9)) drop-shadow(0 0 44px rgba(232,49,91,0.5)); }
    70%  { transform: scale(1); }
    100% { transform: scale(1); }
  }

  /* ─── BAŞLIK ─── */
  .headline {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(2.2rem, 4vw, 3.4rem);
    font-weight: 700;
    letter-spacing: 0.08em;
    line-height: 1.1;
    background: linear-gradient(135deg, var(--gold-light) 0%, var(--cream) 40%, var(--rose-light) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
    animation: headlineGlow 4s ease-in-out infinite alternate;
  }
  @keyframes headlineGlow {
    from { filter: brightness(1); }
    to   { filter: brightness(1.15); }
  }

  /* ─── ALTYAZI ─── */
  .subtitle {
    font-size: 0.8rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.75;
    margin-bottom: 28px;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
  }

  /* ─── İSİMLER ─── */
  .names-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 28px;
  }
  .name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.5rem, 3vw, 2.2rem);
    font-weight: 400;
    font-style: italic;
    color: var(--cream);
    text-shadow: 0 0 30px rgba(255,248,240,0.3);
    letter-spacing: 0.04em;
  }
  .name-divider {
    font-size: 1.6rem;
    animation: dividerPulse 2s ease-in-out infinite;
  }
  @keyframes dividerPulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50%       { opacity: 1;   transform: scale(1.3); }
  }

  /* ─── AYIRICI ─── */
  .divider {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 0 0 28px;
    opacity: 0.5;
  }
  .divider-line {
    flex: 1;
    height: 0.5px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .divider-diamond {
    width: 5px; height: 5px;
    background: var(--gold);
    transform: rotate(45deg);
  }

  /* ─── MESAJ ─── */
  .message {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1rem, 1.6vw, 1.18rem);
    font-style: italic;
    font-weight: 300;
    line-height: 1.85;
    color: rgba(255, 248, 240, 0.88);
    letter-spacing: 0.02em;
    margin-bottom: 32px;
  }
  .message .highlight {
    color: var(--rose-light);
    font-style: normal;
    font-weight: 400;
  }

  /* ─── TARİH SAYACI ─── */
  .counter-section {
    margin-top: 28px;
    padding-top: 24px;
    border-top: 0.5px solid rgba(255,255,255,0.08);
  }
  .counter-label {
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.6;
    margin-bottom: 14px;
  }
  .counter-row {
    display: flex;
    justify-content: center;
    gap: 20px;
  }
  .counter-item {
    text-align: center;
  }
  .counter-num {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--cream);
    display: block;
    line-height: 1;
    text-shadow: 0 0 20px rgba(232,49,91,0.5);
  }
  .counter-unit {
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(255,248,240,0.4);
    margin-top: 4px;
    display: block;
  }
  .counter-sep {
    font-size: 1.8rem;
    color: rgba(232,49,91,0.4);
    align-self: flex-start;
    margin-top: 4px;
  }

  /* ─── ALT İMZA ─── */
  .signature {
    margin-top: 26px;
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,248,240,0.25);
  }
</style>
</head>
<body>

<!-- Canvas katmanları -->
<canvas id="bgCanvas"></canvas>
<canvas id="particleCanvas"></canvas>
<canvas id="overlayCanvas"></canvas>

<!-- Arkaplan dokusu -->
<div class="bg-texture"></div>

<!-- Yüzen yapraklar -->
<div id="petals"></div>

<!-- Fotoğraf köşeleri -->
<div class="photo-orbit orbit-1">
  <div class="photo-frame">
    <img src="foto1.png" alt="Foto 1">
    <div class="shimmer"></div>
  </div>
</div>
<div class="photo-orbit orbit-2">
  <div class="photo-frame">
    <img src="foto2.png" alt="Foto 2">
    <div class="shimmer"></div>
  </div>
</div>
<div class="photo-orbit orbit-3">
  <div class="photo-frame">
    <img src="foto3.png" alt="Foto 3">
    <div class="shimmer"></div>
  </div>
</div>
<div class="photo-orbit orbit-4">
  <div class="photo-frame">
    <img src="foto4.png" alt="Foto 4">
    <div class="shimmer"></div>
  </div>
</div>

<!-- Ana kart -->
<div class="center-stage">
  <div class="card">
    <div class="card-inner-glow"></div>

    <div class="heart-orb" id="heartOrb">❤️</div>

    <h1 class="headline">ADOŞŞ</h1>
    <p class="subtitle">ile sonsuza kadar &nbsp;·&nbsp; forever &amp; always</p>

    <div class="names-row">
      <span class="name">Onur</span>
      <span class="name-divider">❤️</span>
      <span class="name">Ada</span>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line"></div>
    </div>

    <p class="message">
      Sen benim en derin duygum,<br>
      <span class="highlight">en güzel gerçeğimsin.</span><br><br>
      Gözlerinle ruhuma dokunduğun her an,<br>
      dünyanın bütün anlamı sende toplanıyor.<br><br>
      Yanında olmak, seni sevmek…<br>
      Bu hayattaki <span class="highlight">en büyük şansım.</span>
    </p>

    <p class="signature">✦ &nbsp; Onur tarafından Ada'ya, kalpten &nbsp; ✦</p>
  </div>
</div>

<script>
// ══════════════════════════════════════
//  ARKAPLAN — Nebula / Bulutsu efekti
// ══════════════════════════════════════
const bgC = document.getElementById('bgCanvas');
const bgX = bgC.getContext('2d');
const pC  = document.getElementById('particleCanvas');
const pX  = pC.getContext('2d');
const oC  = document.getElementById('overlayCanvas');
const oX  = oC.getContext('2d');

let W, H;
function resize() {
  W = bgC.width  = pC.width  = oC.width  = window.innerWidth;
  H = bgC.height = pC.height = oC.height = window.innerHeight;
  drawNebula();
}
window.addEventListener('resize', resize);

// ─── STATIC NEBULA ───
function drawNebula() {
  bgX.clearRect(0,0,W,H);
  bgX.fillStyle = '#1a0510';
  bgX.fillRect(0,0,W,H);

  const blobs = [
    { x:0.15, y:0.45, rx:0.35, ry:0.55, c:'rgba(120,10,50,0.55)'  },
    { x:0.8,  y:0.25, rx:0.3,  ry:0.4,  c:'rgba(80,5,40,0.45)'   },
    { x:0.5,  y:0.85, rx:0.45, ry:0.3,  c:'rgba(160,20,60,0.35)' },
    { x:0.5,  y:0.5,  rx:0.2,  ry:0.2,  c:'rgba(200,30,70,0.15)' },
  ];
  blobs.forEach(b => {
    const g = bgX.createRadialGradient(b.x*W, b.y*H, 0, b.x*W, b.y*H, Math.max(b.rx*W, b.ry*H));
    g.addColorStop(0, b.c);
    g.addColorStop(1, 'transparent');
    bgX.beginPath();
    bgX.ellipse(b.x*W, b.y*H, b.rx*W, b.ry*H, 0, 0, Math.PI*2);
    bgX.fillStyle = g;
    bgX.fill();
  });

  // Yıldızlar
  for (let i = 0; i < 220; i++) {
    const sx = Math.random()*W, sy = Math.random()*H;
    const r  = Math.random()*1.2;
    const a  = Math.random()*0.6+0.2;
    bgX.beginPath();
    bgX.arc(sx, sy, r, 0, Math.PI*2);
    bgX.fillStyle = `rgba(255,240,230,${a})`;
    bgX.fill();
  }
}

// ══════════════════════════════════════
//  PARTİKÜLLER — Kalpçikler + Kıvılcımlar
// ══════════════════════════════════════
class Particle {
  constructor() { this.reset(true); }
  reset(initial=false) {
    this.x = Math.random()*W;
    this.y = initial ? Math.random()*H : H + 20;
    this.type = Math.random() < 0.12 ? 'heart' : 'spark';
    this.size = this.type === 'heart'
      ? Math.random()*14+6
      : Math.random()*2.5+0.5;
    this.vx = (Math.random()-0.5)*0.8;
    this.vy = -(Math.random()*1.2+0.3);
    this.alpha = Math.random()*0.6+0.2;
    this.life  = 1;
    this.decay = Math.random()*0.003+0.001;
    this.angle = Math.random()*Math.PI*2;
    this.spin  = (Math.random()-0.5)*0.04;
    this.hue   = Math.random() < 0.5
      ? `rgba(232,${Math.floor(Math.random()*60+30)},${Math.floor(Math.random()*60+60)},`
      : `rgba(${Math.floor(Math.random()*30+200)},${Math.floor(Math.random()*80+100)},${Math.floor(Math.random()*50+60)},`;
  }
  update() {
    this.x += this.vx + Math.sin(this.angle)*0.3;
    this.y += this.vy;
    this.angle += this.spin;
    this.life  -= this.decay;
    if (this.life <= 0 || this.y < -30) this.reset();
  }
  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = this.life * this.alpha;
    ctx.translate(this.x, this.y);
    if (this.type === 'heart') {
      ctx.rotate(this.angle);
      ctx.font = `${this.size}px serif`;
      ctx.fillStyle = this.hue+'1)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('♥', 0, 0);
    } else {
      ctx.beginPath();
      ctx.arc(0, 0, this.size, 0, Math.PI*2);
      ctx.fillStyle = this.hue+`${this.life*0.8})`;
      ctx.fill();
    }
    ctx.restore();
  }
}

const particles = Array.from({length: 160}, () => new Particle());

// ══════════════════════════════════════
//  HAVAI FİŞEK SİSTEMİ
// ══════════════════════════════════════
class Firework {
  constructor(x,y) {
    this.x=x; this.y=y;
    this.shards=[];
    const count = Math.floor(Math.random()*40+50);
    const palette = [
      [232,49,91],[255,107,149],[201,168,76],[240,208,128],[255,255,220]
    ];
    const col = palette[Math.floor(Math.random()*palette.length)];
    for (let i=0;i<count;i++) {
      const a = (i/count)*Math.PI*2 + (Math.random()-0.5)*0.4;
      const spd = Math.random()*6+2;
      this.shards.push({
        x, y,
        vx: Math.cos(a)*spd,
        vy: Math.sin(a)*spd,
        r: Math.random()*2.5+0.5,
        col,
        life: 1,
        decay: Math.random()*0.018+0.01,
        trail: []
      });
    }
  }
  update() {
    this.shards.forEach(s=>{
      s.trail.push({x:s.x,y:s.y});
      if (s.trail.length>6) s.trail.shift();
      s.vx *= 0.97; s.vy *= 0.97; s.vy += 0.06;
      s.x += s.vx; s.y += s.vy;
      s.life -= s.decay;
    });
    this.shards = this.shards.filter(s=>s.life>0);
  }
  draw(ctx) {
    this.shards.forEach(s=>{
      ctx.save();
      // Trail
      if (s.trail.length>1) {
        ctx.beginPath();
        ctx.moveTo(s.trail[0].x, s.trail[0].y);
        s.trail.forEach(t=>ctx.lineTo(t.x,t.y));
        ctx.strokeStyle=`rgba(${s.col},${s.life*0.35})`;
        ctx.lineWidth=s.r*0.6;
        ctx.stroke();
      }
      ctx.globalAlpha = s.life;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle=`rgba(${s.col},1)`;
      ctx.shadowColor=`rgba(${s.col},0.8)`;
      ctx.shadowBlur=8;
      ctx.fill();
      ctx.restore();
    });
  }
  done() { return this.shards.length===0; }
}

let fireworks = [];
let fwTimer = 0;

function launchFirework() {
  const x = W*0.2 + Math.random()*W*0.6;
  const y = H*0.1 + Math.random()*H*0.45;
  fireworks.push(new Firework(x,y));
}

// ══════════════════════════════════════
//  OVERLAY — Kalp tıklama efekti
// ══════════════════════════════════════
let clickHearts = [];
document.addEventListener('click', e=>{
  for (let i=0;i<8;i++) {
    clickHearts.push({
      x: e.clientX + (Math.random()-0.5)*40,
      y: e.clientY + (Math.random()-0.5)*40,
      vy: -(Math.random()*3+1.5),
      vx: (Math.random()-0.5)*2,
      size: Math.random()*22+10,
      life: 1,
      decay: 0.025
    });
  }
  // Tıklayınca da havai fişek
  fireworks.push(new Firework(e.clientX, e.clientY));
});

// ══════════════════════════════════════
//  ANA ANİMASYON DÖNGÜSÜ
// ══════════════════════════════════════
let frame = 0;
function animate() {
  requestAnimationFrame(animate);
  frame++;

  // Parçacıklar
  pX.clearRect(0,0,W,H);
  particles.forEach(p=>{ p.update(); p.draw(pX); });

  // Havai fişekler
  oX.clearRect(0,0,W,H);
  fwTimer++;
  if (fwTimer > 140) { launchFirework(); fwTimer = 0; }
  fireworks.forEach(f=>{ f.update(); f.draw(oX); });
  fireworks = fireworks.filter(f=>!f.done());

  // Tıklama kalpleri
  clickHearts.forEach(h=>{
    oX.save();
    oX.globalAlpha = h.life;
    oX.font = `${h.size}px serif`;
    oX.fillText('💗', h.x, h.y);
    h.x += h.vx; h.y += h.vy; h.vy -= 0.05;
    h.life -= h.decay;
    oX.restore();
  });
  clickHearts = clickHearts.filter(h=>h.life>0);
}

// ══════════════════════════════════════
//  YÜZEN YAPRAKLAR (DOM)
// ══════════════════════════════════════
const petalContainer = document.getElementById('petals');
function addPetal() {
  const p = document.createElement('div');
  p.className = 'petal';
  p.style.cssText = `
    left: ${Math.random()*100}vw;
    top: -20px;
    width: ${Math.random()*10+6}px;
    height: ${Math.random()*14+8}px;
    animation-duration: ${Math.random()*8+6}s;
    animation-delay: ${Math.random()*4}s;
    opacity: ${Math.random()*0.5+0.3};
    transform: rotate(${Math.random()*360}deg);
    background: linear-gradient(135deg,
      rgba(${Math.random()<0.5?'232,49,91':'201,168,76'},${Math.random()*0.5+0.3}),
      rgba(255,150,180,0.2));
  `;
  petalContainer.appendChild(p);
  setTimeout(()=>p.remove(), 14000);
}
setInterval(addPetal, 600);

// ══════════════════════════════════════
//  KALP ORB — hover burst efekti
// ══════════════════════════════════════
document.getElementById('heartOrb').addEventListener('mouseenter', ()=>{
  for (let i=0;i<12;i++) {
    const rect = document.getElementById('heartOrb').getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top  + rect.height/2;
    clickHearts.push({
      x: cx + (Math.random()-0.5)*30,
      y: cy + (Math.random()-0.5)*30,
      vy: -(Math.random()*2+2),
      vx: (Math.random()-0.5)*3,
      size: Math.random()*16+8,
      life: 1,
      decay: 0.02
    });
  }
});

// ══════════════════════════════════════
//  BAŞLAT
// ══════════════════════════════════════
resize();
animate();
// İlk havai fişekleri hemen at
setTimeout(()=>{ launchFirework(); launchFirework(); }, 500);
setTimeout(()=>{ launchFirework(); }, 1200);
</script>
