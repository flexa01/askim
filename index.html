<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onur & Ada</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #4a0404; /* Şarap Kırmızısı */
            color: #ff69b4; /* Canlı Pembe */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            z-index: 10;
            background: rgba(0, 0, 0, 0.4);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(8px);
            border: 2px solid #ff69b4;
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.4);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #ff69b4;
        }

        .names {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 20px 0;
        }

        .heart {
            color: #ff0000;
            font-size: 4rem;
            animation: beat 1s infinite;
            display: inline-block;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            max-width: 500px;
            color: #fff;
        }

        @keyframes beat {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <canvas id="fireworks"></canvas>

    <div class="container">
        <h1>Seni Çok Seviyorum</h1>
        <div class="names">Onur <span class="heart">❤️</span> Ada</div>
        <p>
            Birlikte geçirdiğimiz her saniye, her gülüş ve her anı benim için paha biçilemez. 
            Hayatımdaki varlığın, en büyük mutluluğum. Seninle geçen her gün bir kutlama tadında. 
            Daha nice mutlu anılara, hep el ele...
        </p>
    </div>

    <script>
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.velocity = {
                    x: (Math.random() - 0.5) * 8,
                    y: (Math.random() - 0.5) * 8
                };
                this.alpha = 1;
                this.friction = 0.95;
            }

            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }

            update() {
                this.velocity.x *= this.friction;
                this.velocity.y *= this.friction;
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= 0.01;
            }
        }

        let particles = [];

        function createFirework(x, y) {
            const colors = ['#ff69b4', '#ff1493', '#ffffff', '#ff0000'];
            for (let i = 0; i < 40; i++) {
                particles.push(new Particle(x, y, colors[Math.floor(Math.random() * colors.length)]));
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.fillStyle = 'rgba(74, 4, 4, 0.2)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach((particle, index) => {
                if (particle.alpha > 0) {
                    particle.update();
                    particle.draw();
                } else {
                    particles.splice(index, 1);
                }
            });

            if (Math.random() < 0.05) {
                createFirework(Math.random() * canvas.width, Math.random() * canvas.height * 0.5);
            }
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        animate();
    </script>
</body>
</html>
