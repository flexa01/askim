<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Onur & Ada — Sonsuza Kadar</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#12040d;
  --rose:#ff3d74;
  --rose2:#ff7aa2;
  --gold:#e4c26a;
  --cream:#fff7ef;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:var(--bg);
  font-family:'Cormorant Garamond',serif;
  color:white;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,60,120,.18), transparent 30%),
    radial-gradient(circle at 80% 30%, rgba(255,180,80,.12), transparent 30%),
    radial-gradient(circle at 50% 80%, rgba(255,50,100,.12), transparent 35%);
  z-index:0;
}

canvas{
  position:fixed;
  inset:0;
  pointer-events:none;
}

#bgCanvas{z-index:0;}
#pCanvas{z-index:2;}
#oCanvas{z-index:4;}

/* ── PHOTOS ── */

.photo-orbit{
  position:fixed;
  z-index:6;
}

.photo-frame{
  width:100%;
  height:100%;
  overflow:hidden;
  border-radius:18px;
  position:relative;
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.12);
  box-shadow:
    0 10px 40px rgba(0,0,0,.45),
    0 0 24px rgba(255,80,120,.18);
  transition:.45s;
}

.photo-frame:hover{ transform:scale(1.06) !important; }

.photo-frame img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* ── CORNER POSITIONS ── */

/* SOL ÜST */
.orbit-1{
  top:18px;
  left:18px;
  width:min(170px, 26vw);
  height:min(215px, 33vw);
}
.orbit-1 .photo-frame{ transform:rotate(-7deg); }

/* SAĞ ÜST */
.orbit-2{
  top:18px;
  right:18px;
  width:min(170px, 26vw);
  height:min(215px, 33vw);
}
.orbit-2 .photo-frame{ transform:rotate(7deg); }

/* SOL ALT */
.orbit-3{
  bottom:18px;
  left:18px;
  width:min(170px, 26vw);
  height:min(215px, 33vw);
}
.orbit-3 .photo-frame{ transform:rotate(7deg); }

/* SAĞ ALT */
.orbit-4{
  bottom:18px;
  right:18px;
  width:min(170px, 26vw);
  height:min(215px, 33vw);
}
.orbit-4 .photo-frame{ transform:rotate(-7deg); }

/* ── CENTER CARD ── */

.center-stage{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:10;
  /* Genişlik: kenar fotoğrafların içine taşmasın */
  width:min(460px, 44vw);
}

.card{
  position:relative;
  padding:36px 28px;
  border-radius:30px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(28px);
  overflow:hidden;
  text-align:center;
  box-shadow:
    0 20px 60px rgba(0,0,0,.45),
    inset 0 0 80px rgba(255,70,120,.04);
}

.card::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,.05), transparent 40%);
  pointer-events:none;
}

.heart{
  font-size:46px;
  margin-bottom:10px;
  animation:heartBeat 1.7s infinite;
  filter:drop-shadow(0 0 16px rgba(255,70,120,.8));
}

@keyframes heartBeat{
  0%  { transform:scale(1); }
  15% { transform:scale(1.15); }
  30% { transform:scale(1); }
  45% { transform:scale(1.1); }
  100%{ transform:scale(1); }
}

.headline{
  font-size:clamp(1.6rem, 4vw, 3rem);
  font-family:'Playfair Display',serif;
  background:linear-gradient(135deg, var(--gold), white, var(--rose2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:8px;
}

.subtitle{
  color:rgba(255,255,255,.55);
  letter-spacing:.22em;
  font-size:.68rem;
  text-transform:uppercase;
  margin-bottom:18px;
}

.names{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:12px;
  margin-bottom:18px;
}

.names span{
  font-size:clamp(1.3rem, 3vw, 2rem);
  font-family:'Playfair Display',serif;
}

.divider{
  width:100%;
  height:1px;
  background:linear-gradient(to right, transparent, rgba(255,255,255,.45), transparent);
  margin:16px 0;
}

.message{
  line-height:1.8;
  font-size:clamp(.85rem, 2vw, 1.15rem);
  color:rgba(255,255,255,.88);
}

.highlight{ color:var(--rose2); }

.signature{
  margin-top:18px;
  font-size:.65rem;
  letter-spacing:.22em;
  color:rgba(255,255,255,.35);
  text-transform:uppercase;
}

/* ── MOBILE (dar ekran) ── */

@media(max-width:600px){

  /* Fotoğraflar: 4 köşede sabit, küçük */
  .orbit-1, .orbit-2, .orbit-3, .orbit-4{
    width:28vw;
    height:36vw;
  }

  /* Kart: fotoğrafların arasındaki boşluğa sığsın */
  .center-stage{
    width:38vw;   /* fotoğraf (28vw) + boşluk = ~38vw orta alan */
  }

  /* Eğer ekran çok dardaysa yazıları daha da küçült */
  .heart{ font-size:32px; }
  .subtitle{ display:none; }
  .signature{ display:none; }
  .divider{ margin:10px 0; }
  .card{ padding:18px 12px; border-radius:20px; }
  .message{ font-size:.72rem; line-height:1.6; }
  .names{ gap:6px; }
}

/* Çok küçük ekranlar (iPhone SE vb.) */
@media(max-width:380px){
  .orbit-1, .orbit-2, .orbit-3, .orbit-4{
    width:27vw;
    height:34vw;
  }
  .center-stage{ width:40vw; }
}
</style>
</head>

<body>

<canvas id="bgCanvas"></canvas>
<canvas id="pCanvas"></canvas>
<canvas id="oCanvas"></canvas>

<!-- SOL ÜST -->
<div class="photo-orbit orbit-1">
  <div class="photo-frame">
    <img src="foto1.png" alt="">
  </div>
</div>

<!-- SAĞ ÜST -->
<div class="photo-orbit orbit-2">
  <div class="photo-frame">
    <img src="foto2.png" alt="">
  </div>
</div>

<!-- SOL ALT -->
<div class="photo-orbit orbit-3">
  <div class="photo-frame">
    <img src="foto3.png" alt="">
  </div>
</div>

<!-- SAĞ ALT -->
<div class="photo-orbit orbit-4">
  <div class="photo-frame">
    <img src="foto4.png" alt="">
  </div>
</div>

<!-- CENTER -->
<div class="center-stage">
  <div class="card">

    <div class="heart">❤️</div>

    <h1 class="headline">ADOŞŞ</h1>

    <div class="subtitle">forever & always</div>

    <div class="names">
      <span>Onur</span>
      <span>❤️</span>
      <span>Ada</span>
    </div>

    <div class="divider"></div>

    <div class="message">
      Sen benim en derin duygum,<br>
      <span class="highlight">en güzel gerçeğimsin.</span><br><br>

      Gözlerinle ruhuma dokunduğun her an,<br>
      dünyanın bütün anlamı sende toplanıyor.<br><br>

      Yanında olmak, seni sevmek…<br>
      Bu hayattaki <span class="highlight">en büyük şansım.</span>
    </div>

    <div class="signature">✦ ONUR TARAFINDAN ADA'YA ✦</div>

  </div>
</div>

<script>
const bgC = document.getElementById('bgCanvas');
const pC  = document.getElementById('pCanvas');
const oC  = document.getElementById('oCanvas');
const bgX = bgC.getContext('2d');
const pX  = pC.getContext('2d');
const oX  = oC.getContext('2d');

let W, H;

function resize(){
  W = bgC.width = pC.width = oC.width = innerWidth;
  H = bgC.height = pC.height = oC.height = innerHeight;
}

resize();
addEventListener('resize', resize);

class Particle{
  constructor(){ this.reset(); }
  reset(){
    this.x  = Math.random() * W;
    this.y  = Math.random() * H;
    this.r  = Math.random() * 2.5 + .5;
    this.a  = Math.random() * 0.6 + .2;
    this.vy = Math.random() * -.8 - .2;
  }
  update(){
    this.y += this.vy;
    if(this.y < -10){ this.y = H + 10; this.x = Math.random() * W; }
  }
  draw(){
    pX.beginPath();
    pX.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    pX.fillStyle = `rgba(255,255,255,${this.a})`;
    pX.fill();
  }
}

const particles = [];
for(let i = 0; i < 120; i++) particles.push(new Particle());

let hearts = [];

function spawnHearts(x, y){
  for(let i = 0; i < 8; i++){
    hearts.push({
      x, y,
      vx: (Math.random() - .5) * 3,
      vy: -(Math.random() * 3 + 2),
      life: 1,
      size: Math.random() * 18 + 10
    });
  }
}

addEventListener('click', e => spawnHearts(e.clientX, e.clientY));
addEventListener('touchstart', e => {
  const t = e.touches[0];
  spawnHearts(t.clientX, t.clientY);
}, { passive: true });

function animate(){
  requestAnimationFrame(animate);
  pX.clearRect(0, 0, W, H);
  oX.clearRect(0, 0, W, H);

  particles.forEach(p => { p.update(); p.draw(); });

  hearts.forEach(h => {
    oX.globalAlpha = h.life;
    oX.font = `${h.size}px serif`;
    oX.fillText('💗', h.x, h.y);
    h.x += h.vx;
    h.y += h.vy;
    h.life -= 0.02;
  });

  hearts = hearts.filter(h => h.life > 0);
}

animate();
</script>

</body>
</html>
