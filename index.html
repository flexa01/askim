<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onur & Ada</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #4a0404;
            color: #ff69b4;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            z-index: 10;
            background: rgba(0, 0, 0, 0.4);
            padding: 50px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 2px solid #ff69b4;
            box-shadow: 0 0 40px rgba(255, 105, 180, 0.3);
            max-width: 600px;
            margin: 20px;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 5px;
            text-shadow: 0 0 15px #ff69b4;
            letter-spacing: 3px;
        }

        .names {
            font-size: 2.2rem;
            font-weight: bold;
            margin: 15px 0;
            color: #fff;
        }

        .heart {
            color: #ff0000;
            font-size: 3.5rem;
            animation: beat 1.2s infinite;
            display: inline-block;
            vertical-align: middle;
        }

        .message {
            font-size: 1.3rem;
            line-height: 1.8;
            color: #fefefe;
            font-style: italic;
            margin-top: 20px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        @keyframes beat {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* FOTOĞRAFLAR */

        .corner-img{
            position: fixed;
            width: 130px;
            height: 130px;
            object-fit: cover;
            border-radius: 20px;
            border: 3px solid #ff69b4;
            box-shadow: 0 0 20px rgba(255,105,180,0.7);
            z-index: 8;
        }

        .top-left{
            top: 20px;
            left: 20px;
        }

        .top-right{
            top: 20px;
            right: 20px;
        }

        .bottom-left{
            bottom: 20px;
            left: 20px;
        }

        .bottom-right{
            bottom: 20px;
            right: 20px;
        }

    </style>
</head>
<body>

    <canvas id="fireworks"></canvas>

    <!-- FOTOĞRAFLAR -->

    <img src="foto1.png" class="corner-img top-left">
    <img src="foto2.png" class="corner-img top-right">
    <img src="foto3.png" class="corner-img bottom-left">
    <img src="foto4.png" class="corner-img bottom-right">

    <div class="container">
        <h1>ADOŞŞ</h1>

        <div class="names">
            Onur <span class="heart">❤️</span> Ada
        </div>

        <p class="message">
            Sen benim en derin duygum, en güzel gerçeğimsin. <br>
            Gözlerinle ruhuma dokunduğun her an, dünyanın bütün anlamı sende toplanıyor. <br>
            Yanında olmak, seni sevmek... <br>
            Bu hayattaki en büyük şansım.
        </p>
    </div>

    <script>
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;

                this.color = color;

                this.velocity = {
                    x: (Math.random() - 0.5) * 8,
                    y: (Math.random() - 0.5) * 8
                };

                this.alpha = 1;
                this.friction = 0.95;
            }

            draw() {
                ctx.globalAlpha = this.alpha;

                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);

                ctx.fillStyle = this.color;
                ctx.fill();
            }

            update() {
                this.velocity.x *= this.friction;
                this.velocity.y *= this.friction;

                this.x += this.velocity.x;
                this.y += this.velocity.y;

                this.alpha -= 0.008;
            }
        }

        let particles = [];

        function createFirework(x, y) {
            const colors = [
                '#ff69b4',
                '#ff1493',
                '#ffffff',
                '#ff0000',
                '#ffd700'
            ];

            for (let i = 0; i < 50; i++) {
                particles.push(
                    new Particle(
                        x,
                        y,
                        colors[Math.floor(Math.random() * colors.length)]
                    )
                );
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            ctx.fillStyle = 'rgba(74, 4, 4, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach((particle, index) => {
                if (particle.alpha > 0) {
                    particle.update();
                    particle.draw();
                } else {
                    particles.splice(index, 1);
                }
            });

            if (Math.random() < 0.04) {
                createFirework(
                    Math.random() * canvas.width,
                    Math.random() * canvas.height * 0.6
                );
            }
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        animate();
    </script>

</body>
</html>
